<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cart | PetMart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h3 class="logo"><a href="index.html" style="color:#222">PetMart</a></h3>
    </header>

    <section style="padding: 150px 8% 50px;">
        <h2>Shopping Cart</h2>
        <table style="width:100%; border-collapse: collapse; margin-top: 20px;">
            <thead>
                <tr style="background:#eee;">
                    <th style="padding:15px; text-align:left;">Product</th>
                    <th style="padding:15px; text-align:left;">Price</th>
                    <th style="padding:15px; text-align:left;">Action</th>
                </tr>
            </thead>
            <tbody id="fullCartBody"></tbody>
        </table>

        <div style="text-align: right; margin-top: 30px;">
            <h3>Total: ৳<span id="totalPrice">0</span></h3>
            <br>
            <button onclick="clearCart()" style="padding:10px 20px; background:#444; color:white; border:none; cursor:pointer; border-radius:5px;">Clear Cart</button>
            <button class="main-btn">Checkout Now</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
